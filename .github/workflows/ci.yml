name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Run tests
        run: npm test -- --watchAll=false --passWithNoTests

      - name: Build production bundle
        run: npm run build
        env:
          # Provide dummy env vars so Vite build doesn't fail on missing config
          VITE_OPENSKY_CLIENT_ID: ${{ secrets.VITE_OPENSKY_CLIENT_ID || 'ci-placeholder' }}
          VITE_OPENSKY_CLIENT_SECRET: ${{ secrets.VITE_OPENSKY_CLIENT_SECRET || 'ci-placeholder' }}
